<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>Scalpellus</title>

<!-- Instant background (prevents white flash) -->
<style>
html, body {
  background-color: #000;
}
</style>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at center, #0a0f1f, #000000);
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
}

/* Fade-in */
@keyframes fadeIn {
  to { opacity: 1; }
}

/* Base glow (FIXED) */
.glow {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 800px;
  height: 800px;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(0, 150, 255, 0.25), transparent 70%);
  border-radius: 50%;
  filter: blur(120px);
  animation: pulse 6s ease-in-out infinite;
  pointer-events: none;
  will-change: transform;
}

@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
  50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
}

/* Cursor glow (FIXED) */
.cursor-glow {
  position: fixed;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(0, 150, 255, 0.3), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  filter: blur(100px);
}

/* Content */
.container {
  text-align: center;
  z-index: 2;
}

h1 {
  font-size: 64px;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

.tm {
  font-size: 16px;
  vertical-align: super;
  margin-left: 2px;
}

h2 {
  font-size: 22px;
  color: #cccccc;
  letter-spacing: 6px;
  margin-bottom: 40px;
}

/* Button */
a {
  text-decoration: none;
  color: white;
  border: 1px solid white;
  padding: 12px 30px;
  border-radius: 30px;
  font-size: 14px;
  transition: 0.3s;
}

a:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<div class="glow"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<div class="container">
  <h1>Scalpellus<span class="tm">™</span></h1>
  <h2>COMING SOON</h2>

  <a href="https://youtube.com/@scalpellus" target="_blank">
    Visit YouTube
  </a>
</div>

<script>
const cursor = document.getElementById('cursorGlow');

let lastX = 0;
let lastY = 0;
let lastTime = Date.now();

document.addEventListener('mousemove', (e) => {
  const now = Date.now();
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  const dt = now - lastTime;

  const speed = Math.sqrt(dx * dx + dy * dy) / (dt || 1);

  // Speed-based intensity
  const intensity = Math.min(speed * 0.5, 1);

  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
  cursor.style.opacity = 0.2 + intensity;

  lastX = e.clientX;
  lastY = e.clientY;
  lastTime = now;
});
</script>

</body>
</html>
