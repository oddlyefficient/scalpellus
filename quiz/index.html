  { id: 240, text: "AED analyzes and indicates 'no shock advised.' Monitor shows flat line. Rescuer should:", options: ["Turn off AED and stop resuscitation", "Check leads and confirm asystole", "B and D simultaneously", "Resume high-quality CPR for 2 minutes", "Deliver a shock manually"], correct: "c", explanation: "Confirm asystole in multiple leads AND resume CPR immediately for 2 minutes." },
  { id: 241, text: "Phenytoin is specifically contraindicated for seizure control in which poisoning?", options: ["Carbamazepine overdose", "Isoniazid overdose", "Lithium toxicity", "Theophylline toxicity", "Both B and C"], correct: "e", explanation: "Phenytoin is ineffective in theophylline seizures (worsens arrhythmias) and INH seizures (needs pyridoxine)." },
  { id: 242, text: "Bronchospasm during induction. Inhalation agent with best bronchodilatory properties:", options: ["Sevoflurane", "Halothane", "Nitrous oxide", "Isoflurane", "Desflurane"], correct: "a", explanation: "Sevoflurane has best bronchodilatory properties and is non-irritant to airways." },
  { id: 243, text: "Post-surgical C. difficile colitis on broad-spectrum antibiotics. First-line treatment for first episode non-severe:", options: ["Fecal microbiota transplant", "Oral rifaximin", "Oral vancomycin or fidaxomicin", "IV vancomycin", "Oral metronidazole"], correct: "c", explanation: "Current IDSA guidelines: oral vancomycin or fidaxomicin first-line for all C. diff episodes." },
  { id: 244, text: "Procalcitonin (PCT) levels are most useful in distinguishing:", options: ["Acute from chronic infections", "Upper from lower respiratory infections", "Bacterial sepsis from non-infectious SIRS", "Gram-positive from gram-negative", "Viral from fungal"], correct: "c", explanation: "PCT rises significantly in bacterial sepsis but remains low in non-infectious SIRS." },
  { id: 245, text: "In decompensated heart failure with cardiogenic shock, the vasopressor/inotrope combination that best addresses low CO and hypotension is:", options: ["Milrinone + nitroprusside", "Phenylephrine alone", "Vasopressin + esmolol", "Dobutamine + norepinephrine", "Norepinephrine + phenylephrine"], correct: "d", explanation: "Dobutamine provides inotropy; norepinephrine provides vasopressor support — ideal combination." },
  { id: 246, text: "MVC: BP 70/40, HR 140, GCS 12, distended abdomen, FAST positive in Morrison's pouch. Estimated blood loss class:", options: ["Class II (15-30%)", "Class III (30-40%)", "Class IV (>40%)", "Class II with neurogenic component", "Class I (<15%)"], correct: "c", explanation: "Class IV hemorrhagic shock: SBP <90, HR >140, altered consciousness, >40% blood loss." },
  { id: 247, text: "Initial assessment of any critically ill patient in the ED follows:", options: ["History → Physical → Investigations → Treatment", "IV access → Cultures → Antibiotics → Imaging", "CT scan → Blood tests → Treatment → Reassessment", "Primary survey (ABCDE) → Resuscitation → Secondary survey → Definitive care", "Pain assessment → Vital signs → Disposition"], correct: "d", explanation: "ABCDE approach provides systematic, prioritized assessment of life-threatening conditions." },
  { id: 248, text: "Adjuvant analgesics include all EXCEPT:", options: ["Amitriptyline", "Gabapentin", "Dexamethasone", "Ketamine", "Penicillin"], correct: "e", explanation: "Penicillin is an antibiotic, not an adjuvant analgesic." },
  { id: 249, text: "A 28-year-old choking at restaurant, conscious, coughing forcefully, able to speak, SpO2 96%. Initial action:", options: ["Back blows then chest thrusts", "Heimlich maneuver immediately", "Direct laryngoscopy", "Encourage continued coughing", "Call for cricothyroidotomy equipment"], correct: "d", explanation: "Partial airway obstruction with effective coughing requires encouragement to cough; intervention may convert to complete obstruction." },
  { id: 250, text: "A 40-year-old with cardiogenic shock 3 days post-anterior MI, new pansystolic murmur at left sternal border. Echo most likely shows:", options: ["Ventricular septal rupture", "Cardiac tamponade", "Mitral stenosis", "Aortic regurgitation", "LV free wall rupture"], correct: "a", explanation: "New pansystolic murmur 3-5 days post-MI suggests ventricular septal rupture, a mechanical complication." },
  { id: 251, text: "The most important single investigation in a patient presenting with coma of unknown etiology is:", options: ["CT head", "Lumbar puncture", "Blood glucose level", "Toxicology screen", "EEG"], correct: "c", explanation: "Blood glucose is the single most critical bedside test — hypoglycemia is immediately life-threatening and rapidly reversible." },
  { id: 252, text: "ICU patient on day 3 of MV: pH 7.50, PaCO2 35, HCO3 30. Receiving nasogastric suction. Primary acid-base disorder:", options: ["Respiratory alkalosis", "Compensated metabolic acidosis", "Mixed respiratory and metabolic alkalosis", "Metabolic alkalosis", "Respiratory acidosis with compensation"], correct: "d", explanation: "Elevated HCO3 with alkaline pH indicates metabolic alkalosis from NG suction (HCl loss)." },
  { id: 253, text: "Equianalgesic dosing: oral morphine equivalent of fentanyl 100 mcg IV is approximately:", options: ["30 mg oral morphine", "100 mg oral morphine", "5 mg oral morphine", "60 mg oral morphine", "10 mg oral morphine"], correct: "a", explanation: "Fentanyl 100 mcg IV = morphine 10 mg IV = morphine 30 mg oral (oral bioavailability ~30%)." },
  { id: 254, text: "The most reliable dynamic parameter for predicting fluid responsiveness in mechanically ventilated patients is:", options: ["Pulse pressure variation (PPV)", "Urine output", "Mean arterial pressure", "Central venous pressure", "Pulmonary artery occlusion pressure"], correct: "a", explanation: "PPV >13% predicts fluid responsiveness; static pressures (CVP, PAOP) are unreliable." },
  { id: 255, text: "Deferoxamine is the specific chelation therapy for poisoning with:", options: ["Copper", "Lead", "Arsenic", "Mercury", "Iron"], correct: "e", explanation: "Deferoxamine chelates free iron, forming ferrioxamine (vin rose urine)." },
  { id: 256, text: "Which lung volume cannot be measured by spirometry alone?", options: ["Tidal volume", "Expiratory reserve volume", "Inspiratory reserve volume", "Residual volume", "Vital capacity"], correct: "d", explanation: "Residual volume (air remaining after maximal exhalation) requires body plethysmography or helium dilution." },
  { id: 257, text: "Cardiac output is determined by which equation?", options: ["CO = MAP / SVR", "CO = MAP × HR", "CO = SV / HR", "CO = HR × SV", "CO = HR × SVR"], correct: "d", explanation: "Cardiac output = Heart rate × Stroke volume. Normal CO ~5 L/min." },
  { id: 258, text: "Target temperature management (TTM) after cardiac arrest with ROSC targets core temperature of:", options: ["37-38°C for 48 hours", "32-36°C for at least 24 hours", "30-32°C for 12 hours", "36.5-37.5°C with fever prevention", "28-30°C for 72 hours"], correct: "b", explanation: "Current guidelines: target 32-36°C for at least 24 hours; active fever prevention for 72 hours." },
  { id: 259, text: "The coagulation cascade converges at which factor to form the common pathway?", options: ["Factor VII", "Factor X", "Factor IX", "Factor XIII", "Factor XII"], correct: "b", explanation: "Intrinsic and extrinsic pathways converge at Factor X, beginning the common pathway to thrombin and fibrin." },
  { id: 260, text: "Inhalation injury in burn patients is suggested by all EXCEPT:", options: ["Enclosed space fire", "Carbonaceous sputum", "Burns confined to extremities only", "Singed nasal hairs", "Hoarseness and stridor"], correct: "c", explanation: "Burns confined to extremities without facial/airway involvement do not suggest inhalation injury." },
  { id: 261, text: "A 40-year-old on OCPs with sudden pleuritic chest pain, hemoptysis, CT shows saddle embolus. BP 110/70, HR 105, troponin elevated, RV/LV ratio 1.2. Classification:", options: ["Chronic thromboembolic PH", "Low-risk PE", "Massive PE", "Submassive (intermediate-risk) PE", "Incidental PE"], correct: "d", explanation: "Submassive PE: hemodynamically stable with RV dysfunction and/or myocardial injury." },
  { id: 262, text: "Protein C and Protein S are natural anticoagulants that inactivate:", options: ["Antithrombin III", "Factor X and IX", "Factors Va and VIIIa", "Thrombin directly", "Fibrinogen"], correct: "c", explanation: "Activated Protein C with Protein S inactivates Factors Va and VIIIa on phospholipid surfaces." },
  { id: 263, text: "Most effective method of postoperative analgesia allowing patient-controlled dosing is:", options: ["Oral paracetamol alone", "TENS alone", "IM morphine q4h", "Rectal diclofenac", "Patient-controlled analgesia (PCA) with IV morphine"], correct: "e", explanation: "IV PCA provides superior pain control, patient satisfaction, and consistent plasma levels." },
  { id: 264, text: "After successful resuscitation of anaphylactic shock, which medication is prescribed to prevent biphasic reaction and for discharge?", options: ["Prophylactic epinephrine autoinjector only", "IV immunoglobulin", "Long-acting antihistamines for 2 weeks", "Leukotriene receptor antagonists", "Oral prednisone for 3-5 days"], correct: "e", explanation: "Short course of oral corticosteroids (prednisone 40-50 mg daily for 3-5 days) helps prevent biphasic reactions." },
  { id: 265, text: "A 30-year-old unconscious with blood glucose 1.4 mmol/L (25 mg/dL) on insulin therapy. Immediate treatment:", options: ["IV normal saline 1 L", "IV dextrose 50% (D50W) 50 mL", "Subcutaneous glucagon 1 mg", "Oral glucose gel", "Observation"], correct: "b", explanation: "Severe hypoglycemia with unconsciousness requires IV dextrose (50 mL D50W) for rapid correction." },
  { id: 266, text: "Stroke volume is determined by three factors:", options: ["CO, HR, blood volume", "Systolic, diastolic, pulse pressure", "HR, rhythm, conductivity", "Preload, afterload, contractility", "Blood viscosity, vessel length, radius"], correct: "d", explanation: "Stroke volume is determined by preload, afterload, and contractility (Frank-Starling relationship)." },
  { id: 267, text: "Phantom limb pain occurs in approximately what percentage of amputees?", options: ["100%", "10-15%", "Less than 5%", "30-40%", "50-80%"], correct: "e", explanation: "Phantom limb pain affects 50-80% of amputees and is a form of neuropathic pain." },
  { id: 268, text: "Myasthenia gravis with respiratory failure: VC 800 mL (predicted 3200), MIP -15 cmH2O. Type of respiratory failure:", options: ["Combined Type I and II", "Type I (hypoxemic)", "Type II (hypercapnic)", "Type III (perioperative)", "Type IV (shock-related)"], correct: "c", explanation: "Neuromuscular weakness causes pump failure → inadequate ventilation → CO2 retention (Type II)." },
  { id: 269, text: "Known difficult airway requiring emergency intubation. Device of choice for first attempt:", options: ["Direct laryngoscopy Macintosh", "Video laryngoscopy", "Blind nasotracheal intubation", "Retrograde intubation", "LMA insertion only"], correct: "b", explanation: "Video laryngoscopy improves glottic view and first-pass success in anticipated difficult airways." },
  { id: 270, text: "During adult CPR without advanced airway, correct compression-to-ventilation ratio for single rescuer is:", options: ["15:1", "15:2", "30:2", "Continuous compressions only", "5:1"], correct: "c", explanation: "For adult CPR without advanced airway, ratio is 30 compressions to 2 ventilations." },
  { id: 271, text: "Acute chest pain, diaphoresis, ECG: ST elevation in leads II, III, aVF. Diagnosis:", options: ["Inferior wall STEMI", "Posterior wall STEMI", "Right ventricular MI", "Anterior wall STEMI", "Lateral wall STEMI"], correct: "a", explanation: "ST elevation in II, III, aVF indicates inferior wall STEMI (usually RCA occlusion)." },
  { id: 272, text: "Neonate born at 28 weeks with respiratory distress shortly after birth. Most likely cause is deficiency of:", options: ["IgA in airways", "Angiotensin-converting enzyme", "Alpha-1 antitrypsin", "Pulmonary surfactant", "Nitric oxide"], correct: "d", explanation: "Premature neonates have insufficient surfactant production → neonatal RDS (hyaline membrane disease)." },
  { id: 273, text: "The Surviving Sepsis Campaign 'Hour-1 Bundle' includes all EXCEPT:", options: ["Blood cultures before antibiotics", "Initiate corticosteroids within first hour", "30 mL/kg crystalloid for hypotension or lactate ≥4", "Broad-spectrum antibiotics", "Measure serum lactate"], correct: "b", explanation: "Corticosteroids are considered only for vasopressor-refractory shock, not as a first-hour intervention." },
  { id: 274, text: "Supportive care in ICU for poisoned patients includes all EXCEPT:", options: ["Routine prophylactic antibiotics", "Continuous cardiac monitoring", "Seizure management with benzodiazepines", "Serial vital signs and neuro checks", "Temperature management"], correct: "a", explanation: "Prophylactic antibiotics are NOT indicated unless there is aspiration or confirmed infection." }
];

// ============================================================
// APP STATE
// ============================================================
let currentIndex = 0;
let userAnswers = new Array(QUESTIONS_DATA.length).fill(null);
let score = 0;

// DOM elements
const questionTextEl = document.getElementById("questionText");
const optionsContainer = document.getElementById("optionsContainer");
const feedbackArea = document.getElementById("feedbackArea");
const explanationTextEl = document.getElementById("explanationText");
const nextBtn = document.getElementById("nextBtn");
const resetBtn = document.getElementById("resetBtn");
const questionCounterSpan = document.getElementById("questionCounter");
const progressFill = document.getElementById("progressFill");
const scoreDisplay = document.getElementById("scoreDisplay");

function updateStats() {
    const answeredCount = userAnswers.filter(a => a !== null).length;
    const total = QUESTIONS_DATA.length;
    const percent = total === 0 ? 0 : Math.round((score / total) * 100);
    scoreDisplay.innerHTML = `✅ Score: ${score} / ${total} (${percent}%) | 📝 Answered: ${answeredCount}/${total}`;
    const progressPercent = ((currentIndex + 1) / total) * 100;
    progressFill.style.width = `${progressPercent}%`;
    questionCounterSpan.innerText = `Question ${currentIndex + 1} / ${total}`;
}

function renderCurrentQuestion() {
    const q = QUESTIONS_DATA[currentIndex];
    if (!q) return;
    questionTextEl.innerHTML = `<strong>Q${q.id}.</strong> ${q.text}`;
    
    const optionLetters = ['a', 'b', 'c', 'd', 'e'];
    let optionsHtml = '';
    q.options.forEach((opt, idx) => {
        const letter = optionLetters[idx];
        const isAnswered = userAnswers[currentIndex] !== null;
        const selectedLetter = userAnswers[currentIndex] ? userAnswers[currentIndex].selected : null;
        let borderStyle = '';
        if (isAnswered && selectedLetter === letter) {
            const isAnsCorrect = userAnswers[currentIndex].isCorrect;
            borderStyle = isAnsCorrect ? 'border: 2px solid #2b8c4a; background:#e0f2e9;' : 'border: 2px solid #c73a2b; background:#ffe0de;';
        }
        optionsHtml += `<button class="option-btn" data-letter="${letter}" ${isAnswered ? 'disabled' : ''} style="${borderStyle}">${letter.toUpperCase()}. ${opt}</button>`;
    });
    optionsContainer.innerHTML = optionsHtml;
    
    if (userAnswers[currentIndex] !== null) {
        const answerData = userAnswers[currentIndex];
        const qData = QUESTIONS_DATA[currentIndex];
        const correctLetter = qData.correct;
        const correctText = qData.options[optionLetters.indexOf(correctLetter)] || "";
        if (answerData.isCorrect) {
            feedbackArea.className = "feedback correct";
            document.getElementById("feedbackIcon").innerHTML = "✅ Correct!";
            explanationTextEl.innerHTML = `<strong>Explanation:</strong> ${qData.explanation}<br><span style="font-size:0.85rem;">✔ Your answer: ${answerData.selected.toUpperCase()}. Correct: ${correctLetter.toUpperCase()}. ${correctText}</span>`;
        } else {
            feedbackArea.className = "feedback wrong";
            document.getElementById("feedbackIcon").innerHTML = "❌ Incorrect";
            explanationTextEl.innerHTML = `<strong>Explanation:</strong> ${qData.explanation}<br><span style="font-size:0.85rem;">✘ You chose: ${answerData.selected.toUpperCase()}. Correct: ${correctLetter.toUpperCase()}. ${correctText}</span>`;
        }
        feedbackArea.style.display = "flex";
    } else {
        feedbackArea.className = "feedback";
        feedbackArea.style.display = "none";
    }
    
    document.querySelectorAll('.option-btn:not([disabled])').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const selectedLetter = btn.getAttribute('data-letter');
            handleAnswer(selectedLetter);
        });
    });
    
    updateStats();
}

function handleAnswer(selectedLetter) {
    if (userAnswers[currentIndex] !== null) return;
    const q = QUESTIONS_DATA[currentIndex];
    const isCorrect = (selectedLetter === q.correct);
    userAnswers[currentIndex] = { selected: selectedLetter, isCorrect: isCorrect };
    if (isCorrect) score++;
    renderCurrentQuestion();
}

function nextQuestion() {
    if (userAnswers[currentIndex] === null) {
        alert("Please answer the current question before proceeding.");
        return;
    }
    if (currentIndex + 1 < QUESTIONS_DATA.length) {
        currentIndex++;
        renderCurrentQuestion();
    } else {
        alert(`🎉 Quiz completed! Final score: ${score}/${QUESTIONS_DATA.length} (${Math.round((score/QUESTIONS_DATA.length)*100)}%)`);
    }
}

function resetQuiz() {
    if (confirm("Reset all progress? All answers will be erased.")) {
        userAnswers = new Array(QUESTIONS_DATA.length).fill(null);
        score = 0;
        currentIndex = 0;
        renderCurrentQuestion();
    }
}

nextBtn.addEventListener("click", nextQuestion);
resetBtn.addEventListener("click", resetQuiz);

renderCurrentQuestion();
</script>
